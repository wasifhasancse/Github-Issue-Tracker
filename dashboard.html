<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- document title -->
  <title>Github Issue Tracker</title>
  <!-- favicon link -->
  <link rel="icon" href="./assets/Aperture.png" type="image/x-icon">

  <!-- daisyUI and Tailwind CSS CDN links -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- import google font link (Geist) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- fontawesome CDN link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- stylesheet css link  -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- navigation bar start -->
  <div class="navbar bg-base-100 shadow-sm">
    <div class="navbar-start">
      <a class="btn btn-ghost text-xl"><img class="w-9" src="./assets/github-logo.png" alt="GitHub Logo">GitHub Issues Tracker</a>
    </div>

    <div class="navbar-end space-x-2.5">
      <label class="input">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </g>
        </svg>
        <input type="search" required placeholder="Search issues..." />
      </label>
      <a class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</a>
    </div>
  </div>
  <!-- navigation bar end -->

  <!-- link js -->
  <script src="./js/index.js"></script>

</body>

</html>
