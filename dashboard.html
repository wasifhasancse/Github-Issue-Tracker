<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- document title -->
  <title>Github Issue Tracker</title>
  <!-- favicon link -->
  <link rel="icon" href="./assets/Aperture.png" type="image/x-icon">

  <!-- daisyUI and Tailwind CSS CDN links -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- import google font link (Geist) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- fontawesome CDN link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- stylesheet css link  -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- navigation bar start -->
  <div class="navbar flex-col md:flex-row bg-base-100 shadow-sm gap-2.5 p-3 md:p-6">
    <div class="navbar-start w-full items-center justify-center md:justify-start flex-1">
      <a class="flex items-center justify-center font-semibold text-xl"><img class="w-9 mr-2.5"
          src="./assets/github-logo.png" alt="GitHub Logo">GitHub Issues Tracker</a>
    </div>

    <div
      class="navbar-end space-x-2.5 flex-1 flex-wrap md:flex-nowrap items-center justify-center md:justify-end w-full gap-2.5">
      <label class="input">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </g>
        </svg>
        <input type="search" required placeholder="Search issues..." />
      </label>
      <a class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</a>
    </div>
  </div>
  <!-- navigation bar end -->

  <!-- Tab Section start -->
  <section class="bg-[#F8FAFC] py-10">
    <div class="bg-white w-11/12 mx-auto rounded-lg shadow-sm">
      <div id="tab-buttons" class="flex items-center justify-start gap-2.5 p-4 md:p-6">
        <button onclick="activeTabButton('all-issues-btn')" id="all-issues-btn"
          class="tab-button py-1.5 px-2.5 font-semibold border-2 border-indigo-300 bg-indigo-700 text-white hover:bg-indigo-800 rounded w-32">All</button>
        <button onclick="activeTabButton('open-issues-btn')" id="open-issues-btn"
          class="tab-button py-1.5 px-2.5 font-semibold border-2 border-gray-300 text-gray-500 hover:bg-gray-200 rounded w-32 ">Open</button>
        <button onclick="activeTabButton('closed-issues-btn')" id="closed-issues-btn"
          class="tab-button py-1.5 px-2.5 font-semibold border-2 border-gray-300 text-gray-500 hover:bg-gray-200 rounded w-32 ">Closed</button>
      </div>
    </div>
  </section>
  <!-- Tab Section end -->

  <section class="bg-[#F8FAFC] flow-root">
    <div class="bg-white w-11/12 mx-auto rounded-lg shadow-md mb-10">

      <!-- the issue count Section start -->
      <div
        class="flex flex-col md:flex-row items-start md:items-center justify-between border-b-2 border-gray-200 md:gap-3 gap-0">
        <div class="flex items-center justify-start gap-2 md:gap-2.5 p-4 md:p-6 w-full sm:w-auto">
          <img class="p-2 sm:p-2.5 bg-indigo-100 rounded-full w-10 h-10 sm:w-auto sm:h-auto" src="./assets/Aperture.png"
            alt="Aperture Logo">
          <div>
            <h1 id="issues-count" class="text-base sm:text-lg md:text-xl font-semibold">50 Issues</h1>
            <p class="text-gray-500 text-xs sm:text-sm md:text-base">Track and manage your project issues</p>
          </div>
        </div>
        <div
          class="flex items-center justify-start sm:justify-between gap-4 sm:gap-5 px-4 pb-4 sm:p-5 md:p-6 w-full sm:w-auto">
          <div class="flex items-center gap-1.5 sm:gap-2 font-medium text-sm sm:text-base">
            <i class="fa-solid fa-circle text-green-500 text-xs sm:text-sm"></i>
            <p>Open</p>
          </div>
          <div class="flex items-center gap-1.5 sm:gap-2 font-medium text-sm sm:text-base">
            <i class="fa-solid fa-circle text-purple-500 text-xs sm:text-sm"></i>
            <p>Closed</p>
          </div>
        </div>
      </div>
      <!-- the issue count Section end -->

      <!-- the issue list section start -->
      <div class="p-4 md:p-6">
        <div id="issue-card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
          <!-- the issue cards will be here dynamically from API -->
        </div>
      </div>
      <!-- the issue list section end -->

      <!-- the modal section start -->
      <dialog id="issueCardModal" class="modal modal-middle flex items-center justify-center">
        <!-- modal content will be here dynamically from API -->
      </dialog>
      <!-- the modal section end -->

    </div>
  </section>

  <!-- link js -->
  <script src="./js/index.js"></script>
</body>

</html>
